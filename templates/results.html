<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Summary | ResearchNova AI</title>
    <style>
        :root {
            --bg: #F4F7FB;
            --surface: #FFFFFF;
            --surface-soft: #F8FAFC;
            --border: #DDE1E6;
            --text: #161616;
            --text-soft: #525252;
            --primary: #0F62FE;
            --accent: #08BDBA;
            --shadow: 0 16px 40px rgba(22,22,22,0.08);
            --radius-lg: 20px;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh; background: linear-gradient(180deg, #F9FBFE 0%, var(--bg) 100%);
            color: var(--text); font-family: "IBM Plex Sans", "Segoe UI", Arial, sans-serif; padding: 28px 18px;
        }
        .shell { max-width: 950px; margin: 0 auto; padding: 24px; border-radius: var(--radius-lg); background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow); }
        .eyebrow { color: var(--primary); font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; font-size: 0.78rem; }
        h1 { font-size: clamp(1.6rem, 3vw, 2.2rem); margin-top: 8px; }
        .sub { color: var(--text-soft); margin-top: 8px; line-height: 1.6; }
        .card { margin-top: 18px; padding: 20px; border-radius: 16px; background: var(--surface-soft); border: 1px solid var(--border); }
        .answer { color: var(--text-soft); line-height: 1.8; white-space: pre-wrap; }
        .back-link { display: inline-block; margin-top: 18px; color: var(--primary); text-decoration: none; font-weight: 700; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <main class="shell">
        <div class="eyebrow">ResearchNova AI</div>
        <h1>Research Answer</h1>
        <p class="sub">A grounded response generated from the uploaded paper and retrieved evidence.</p>
        <div class="card">
            <div class="answer">{{ answer }}</div>
        </div>
        <a class="back-link" href="/">← Return to the workspace</a>
    </main>
</body>
</html>
