<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResearchNova AI</title>
    <style>
        :root {
            --bg: #F4F7FB;
            --surface: #FFFFFF;
            --surface-soft: #F8FAFC;
            --border: #DDE1E6;
            --text: #161616;
            --text-soft: #525252;
            --primary: #0F62FE;
            --primary-soft: rgba(15, 98, 254, 0.12);
            --accent: #08BDBA;
            --accent-soft: rgba(8, 189, 186, 0.12);
            --novelty: #FFB000;
            --success: #2F9E44;
            --warning: #E67E22;
            --danger: #D64545;
            --shadow: 0 16px 40px rgba(22, 22, 22, 0.08);
            --radius-lg: 20px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --sidebar-width: 280px;
        }
        * { box-sizing: border-box; }
        html { background: var(--bg); }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #F9FBFE 0%, var(--bg) 100%);
            color: var(--text);
            font-family: "IBM Plex Sans", "Segoe UI", Arial, sans-serif;
            overflow-x: hidden;
        }
        button, input, textarea { font: inherit; }
        button { cursor: pointer; }
        a { color: inherit; }
        h1,h2,h3,h4,p { margin: 0; }
        .app-shell { display: flex; min-height: 100vh; }
        .sidebar {
            width: var(--sidebar-width); flex-shrink: 0; padding: 20px 16px; border-right: 1px solid var(--border);
            background: rgba(255,255,255,0.9); backdrop-filter: blur(16px);
            display: flex; flex-direction: column; gap: 16px;
        }
        .sidebar-paper-card {
            padding: 16px; border-radius: var(--radius-lg); border: 1px solid var(--border); background: linear-gradient(135deg, var(--surface), var(--surface-soft));
            box-shadow: var(--shadow);
            display: grid; gap: 12px;
        }
        .sidebar-paper-title-row {
            display: flex; align-items: center; gap: 10px;
        }
        .sidebar-paper-icon {
            width: 38px; height: 38px; border-radius: 12px; display: grid; place-items: center; background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; font-size: 1rem;
        }
        .sidebar-paper-heading { font-size: 0.98rem; font-weight: 700; }
        .sidebar-paper-subtitle { margin-top: 3px; color: var(--text-soft); font-size: 0.82rem; line-height: 1.4; }
        .sidebar-paper-copy { color: var(--text-soft); font-size: 0.9rem; line-height: 1.5; }
        .upload-surface {
            border: 1px dashed #B7C4D4; border-radius: 14px; padding: 12px; background: linear-gradient(135deg, #F8FBFF 0%, #F3F7FF 100%); display: grid; gap: 8px;
            text-align: center;
        }
        .upload-surface-title { font-size: 0.9rem; font-weight: 700; color: var(--text); }
        .upload-surface-copy { font-size: 0.8rem; color: var(--text-soft); }
        .sidebar-paper-grid {
            display: grid; gap: 8px;
        }
        .sidebar-paper-row {
            padding: 8px 10px; border-radius: 10px; background: var(--surface-soft); border: 1px solid var(--border);
            display: flex; justify-content: space-between; gap: 10px; align-items: flex-start;
        }
        .sidebar-paper-row strong { font-size: 0.78rem; color: var(--text); display: block; }
        .sidebar-paper-row span { font-size: 0.8rem; color: var(--text-soft); display: block; line-height: 1.4; }
        .status-pill {
            display: inline-flex; align-items: center; gap: 6px; width: fit-content; padding: 6px 10px; border-radius: 999px; background: rgba(47, 158, 68, 0.12); color: var(--success); font-size: 0.75rem; font-weight: 700;
        }
        .sidebar-paper-actions { display: flex; flex-wrap: wrap; gap: 8px; }
        .sidebar-paper-actions .ghost-btn, .sidebar-paper-actions .primary-btn { padding: 8px 11px; font-size: 0.8rem; }
        .nav-list { display: grid; gap: 8px; }
        .nav-item {
            border: 1px solid transparent; background: transparent; color: var(--text-soft); display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; border-radius: 12px; text-align: left; transition: all 180ms ease; position: relative;
        }
        .nav-item:hover { background: var(--surface-soft); color: var(--text); transform: translateX(2px); border-color: var(--border); }
        .nav-item.active { background: var(--primary-soft); color: var(--primary); border-color: rgba(15, 98, 254, 0.16); }
        .nav-icon { width: 32px; height: 32px; border-radius: 10px; display: grid; place-items: center; background: var(--surface-soft); color: var(--text); }
        .nav-item.active .nav-icon { background: var(--primary); color: white; }
        .nav-item.feature .nav-icon { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; }
        .core-badge { margin-left: auto; padding: 4px 8px; border-radius: 999px; background: rgba(255,176,0,0.12); color: #A96A00; font-size: 0.72rem; font-weight: 700; }
        .sidebar-card { margin-top: auto; padding: 14px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--surface); box-shadow: var(--shadow); }
        .sidebar-card h4 { font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-soft); margin-bottom: 8px; }
        .sidebar-card .paper-name { font-weight: 700; line-height: 1.4; }
        .sidebar-card .paper-metric { margin-top: 4px; color: var(--text-soft); font-size: 0.9rem; }
        .main-panel { flex: 1; padding: 24px; display: flex; flex-direction: column; gap: 18px; }
        .topbar {
            display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; padding: 22px 24px; border-radius: var(--radius-lg);
            background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow);
        }
        .topbar h1 { font-size: 1.26rem; font-weight: 700; letter-spacing: -0.01em; }
        .topbar p { margin-top: 6px; color: var(--text-soft); font-size: 0.93rem; line-height: 1.55; }
        .topbar-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .pill {
            display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: var(--surface-soft); border: 1px solid var(--border);
            color: var(--text-soft); font-size: 0.84rem; font-weight: 600;
        }
        .pill::before { content: ""; width: 8px; height: 8px; background: var(--success); border-radius: 50%; }
        .content-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow); overflow: hidden; }
        .content-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .content-header.is-hidden { display: none; }
        .content-title h3 { font-size: 1.06rem; font-weight: 700; }
        .content-title p { margin-top: 4px; color: var(--text-soft); font-size: 0.9rem; }
        .content-body { padding: 22px 24px 24px; }
        .paper-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
        .paper-card-actions { display: flex; flex-wrap: wrap; gap: 10px; }
        .btn-row { display: flex; gap: 10px; align-items: center; flex-wrap: nowrap; }
        .btn-row button { white-space: nowrap; }
        .primary-btn, .secondary-btn, .ghost-btn, .icon-btn {
            border: 0; border-radius: 12px; padding: 10px 14px; font-weight: 700; transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
        }
        .primary-btn:hover, .secondary-btn:hover, .ghost-btn:hover, .icon-btn:hover { transform: translateY(-1px); }
        .primary-btn:disabled, .ghost-btn:disabled, .icon-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }
        .primary-btn { background: linear-gradient(135deg, var(--primary), #2A74FF); color: white; box-shadow: 0 10px 24px rgba(15,98,254,0.18); }
        .secondary-btn { background: linear-gradient(135deg, var(--accent), #0AA4A0); color: white; }
        .ghost-btn { background: var(--surface-soft); color: var(--text); border: 1px solid var(--border); }
        .icon-btn { background: var(--surface-soft); color: var(--text-soft); border: 1px solid var(--border); }
        .grid-2 { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 16px; }
        .stack { display: grid; gap: 16px; }
        .paper-card, .upload-card, .workflow-card, .activity-card, .output-card, .assistant-card, .export-card, .evidence-card, .novelty-card, .empty-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow); padding: 18px 18px 16px;
        }
        .paper-card .meta-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 12px; margin-top: 14px; }
        .metric-box { padding: 12px 14px; border-radius: var(--radius-md); background: var(--surface-soft); border: 1px solid var(--border); }
        .metric-label { display: block; color: var(--text-soft); font-size: 0.74rem; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
        .metric-value { font-weight: 700; line-height: 1.4; }
        .upload-card { border: 1px dashed #B2C1D5; background: linear-gradient(135deg, #F7FAFD 0%, #F3F8FF 100%); text-align: center; transition: border-color 180ms ease, transform 180ms ease; }
        .upload-card.drag-over { border-color: var(--primary); transform: translateY(-2px); }
        .upload-card.success { border-color: var(--success); background: linear-gradient(135deg, #F3FCF6 0%, #F5FFF7 100%); }
        .upload-card svg { color: var(--primary); }
        .upload-card h3 { margin-top: 12px; font-size: 1.12rem; }
        .upload-card p { margin-top: 8px; color: var(--text-soft); line-height: 1.6; }
        .upload-actions { display: flex; justify-content: center; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
        .upload-input { display: none; }
        .workflow-pipeline { display: grid; gap: 10px; }
        .workflow-step { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 14px; background: var(--surface-soft); border: 1px solid var(--border); transition: all 180ms ease; }
        .workflow-step.complete { border-color: rgba(47, 158, 68, 0.3); background: rgba(47, 158, 68, 0.06); }
        .workflow-step.active { border-color: rgba(15, 98, 254, 0.2); background: rgba(15, 98, 254, 0.06); }
        .workflow-step .step-icon { width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; background: var(--surface); color: var(--text-soft); border: 1px solid var(--border); }
        .workflow-step.complete .step-icon { background: var(--success); color: white; border-color: var(--success); }
        .workflow-step.active .step-icon { background: var(--primary); color: white; border-color: var(--primary); }
        .step-text strong { display: block; }
        .step-text span { display: block; font-size: 0.85rem; color: var(--text-soft); margin-top: 2px; }
        .timeline { display: grid; gap: 10px; }
        .timeline-item { display: flex; gap: 10px; align-items: flex-start; padding: 10px 12px; border-radius: 12px; background: var(--surface-soft); border: 1px solid var(--border); }
        .timeline-item .dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; background: var(--success); flex-shrink: 0; }
        .timeline-item.running .dot { background: var(--novelty); }
        .timeline-item.error .dot { background: var(--danger); }
        .timeline-item strong { display: block; }
        .timeline-item span { display: block; margin-top: 3px; color: var(--text-soft); font-size: 0.85rem; }
        .result-shell { display: grid; gap: 16px; }
        .result-header { display: flex; justify-content: space-between; align-items: center; gap: 14px; padding: 16px 18px; border-radius: var(--radius-md); background: var(--surface-soft); border: 1px solid var(--border); }
        .result-body { padding: 18px; border-radius: var(--radius-md); background: var(--surface-soft); border: 1px solid var(--border); color: var(--text-soft); line-height: 1.7; white-space: pre-wrap; }
        .empty-card { text-align: center; padding: 32px 24px; }
        .empty-card h4 { margin-top: 12px; font-size: 1.05rem; }
        .empty-card p { margin-top: 8px; max-width: 520px; margin-left: auto; margin-right: auto; color: var(--text-soft); line-height: 1.65; }
        .empty-card .primary-btn { margin-top: 16px; }
        .evidence-list { display: grid; gap: 12px; }
        .evidence-card .evidence-top { display: flex; justify-content: space-between; gap: 10px; align-items: start; }
        .evidence-card .evidence-title { font-weight: 700; }
        .evidence-card .evidence-meta { margin-top: 4px; color: var(--text-soft); font-size: 0.9rem; }
        .evidence-card .score-pill { padding: 6px 9px; border-radius: 999px; background: rgba(15,98,254,0.1); color: var(--primary); font-weight: 700; font-size: 0.78rem; }
        .evidence-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .assistant-card { display: grid; gap: 14px; }
        .suggestion-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .suggestion-chip { padding: 8px 10px; border-radius: 999px; background: var(--surface-soft); border: 1px solid var(--border); color: var(--text-soft); }
        .messages { display: grid; gap: 10px; max-height: 360px; overflow: auto; padding-right: 4px; }
        .message { padding: 11px 12px; border-radius: 12px; background: var(--surface-soft); border: 1px solid var(--border); color: var(--text-soft); line-height: 1.55; }
        .message.user { background: rgba(15,98,254,0.08); color: var(--text); border-color: rgba(15,98,254,0.16); }
        .message.typing::after { content: "…"; animation: pulse 0.9s steps(4,end) infinite; }
        .assistant-input { display: flex; gap: 8px; }
        .assistant-input input { flex: 1; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface-soft); color: var(--text); }
        .novelty-card { display: grid; gap: 18px; }
        .novelty-hero { display: grid; grid-template-columns: 220px minmax(0,1fr); gap: 18px; align-items: center; }
        /* Novelty Gauge - redesigned */
        .gauge-shell { position: relative; width: 220px; height: 220px; margin: 0 auto; display: grid; place-items: center; }
        .novelty-gauge { position: relative; width: 220px; height: 220px; border-radius: 50%; display: grid; place-items: center; background: radial-gradient(circle at 50% 40%, rgba(255,255,255,0.6), transparent 40%); box-shadow: 0 8px 30px rgba(15,98,254,0.06); }
        .novelty-gauge .ring { position: absolute; inset: 0; border-radius: 50%; padding: 12px; }
        .novelty-gauge .ring::before { content: ""; position: absolute; inset: 12px; border-radius: 50%; background: var(--surface); }
        .novelty-center { position: relative; z-index: 2; display: grid; place-items: center; text-align: center; }
        .novelty-score { font-size: 2.6rem; font-weight: 900; letter-spacing: -0.02em; }
        .novelty-grade { margin-top: 6px; font-weight: 800; font-size: 0.86rem; letter-spacing: 0.06em; }
        .novelty-gauge.small { width: 140px; height: 140px; }
        /* Color mapping utility classes */
        .grade-red { color: #D64545; }
        .grade-orange { color: #E67E22; }
        .grade-blue { color: #2A74FF; }
        .grade-green { color: #2F9E44; }
        .grade-gold { color: #FFB000; }
        /* Floating assistant */
        .assistant-floating { position: fixed; right: 24px; bottom: 24px; width: 360px; max-width: calc(100% - 48px); border-radius: 16px; box-shadow: 0 18px 50px rgba(22,22,22,0.12); background: var(--surface); z-index: 1200; overflow: hidden; display: grid; grid-template-rows: auto 1fr auto; }
        .assistant-floating .header { padding: 12px 14px; border-bottom: 1px solid var(--border); display:flex; align-items:center; gap:10px; }
        .assistant-floating .messages { padding: 12px; max-height: 340px; overflow:auto; display:grid; gap:10px; }
        .assistant-floating .message { padding: 10px 12px; border-radius: 12px; max-width: 82%; }
        .assistant-floating .message.user { justify-self: end; background: rgba(15,98,254,0.08); color: var(--text); }
        .assistant-floating .message.assistant { justify-self: start; background: var(--surface-soft); }
        .assistant-floating .typing { opacity: 0.8; font-style: italic; }
        .assistant-floating .input-row { padding: 10px; border-top: 1px solid var(--border); display:flex; gap:8px; }
        .assistant-floating .input-row input { flex:1; padding:10px 12px; border-radius: 10px; border:1px solid var(--border); }
        .assistant-floating .input-row button { padding: 8px 12px; border-radius: 10px; }
        /* Subtle animations */
        .fade-in { animation: fadeIn 320ms ease both; }
        .slide-up { animation: slideUp 320ms ease both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px);} to { opacity:1; transform:none;} }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px);} to { opacity:1; transform:none;} }
        .novelty-stats { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 12px; margin-top: 14px; }
        .stat-card { padding: 12px 14px; border-radius: 13px; background: var(--surface-soft); border: 1px solid var(--border); }
        .stat-label { display: block; color: var(--text-soft); font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 6px; }
        .export-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 12px; }
        .export-item { padding: 14px; border-radius: var(--radius-md); background: var(--surface-soft); border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .loading-shell { display: grid; gap: 12px; }
        .skeleton-card { padding: 16px; border-radius: var(--radius-md); background: var(--surface-soft); border: 1px solid var(--border); position: relative; overflow: hidden; }
        .skeleton-card::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(22,22,22,0.06), transparent); animation: shimmer 1.1s infinite; }
        .skeleton-line { height: 10px; border-radius: 999px; background: rgba(22,22,22,0.08); margin-bottom: 8px; }
        .skeleton-line.short { width: 55%; }
        .skeleton-line.medium { width: 75%; }
        .skeleton-line.tall { height: 14px; }
        @keyframes pulse { 0%,100% { opacity: 0.45; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.05); } }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        /* Chat UI */
        .chat-msg { display: flex; }
        .chat-msg--user { justify-content: flex-end; }
        .chat-msg--assistant { justify-content: flex-start; }
        .chat-bubble { max-width: 78%; padding: 11px 15px; border-radius: 16px; line-height: 1.65; font-size: 0.93rem; }
        .chat-bubble p { margin: 0 0 5px; }
        .chat-bubble p:last-child { margin-bottom: 0; }
        .chat-msg--user .chat-bubble { background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
        .chat-msg--assistant .chat-bubble { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; }
        @media (max-width: 1000px) { .novelty-hero { grid-template-columns: 1fr; } }
        @media (max-width: 820px) { .app-shell { flex-direction: column; } .sidebar { width: 100%; border-right: 0; border-bottom: 1px solid var(--border); } .main-panel { padding: 16px; } .topbar { flex-direction: column; align-items: flex-start; } .grid-2 { grid-template-columns: 1fr; } .export-grid { grid-template-columns: 1fr; } }
        @media (max-width: 600px) { .paper-card .meta-grid { grid-template-columns: 1fr; } .novelty-stats { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <nav class="nav-list" aria-label="Primary navigation">
                <button class="nav-item active" data-view="workspace" type="button"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-4v-5H9v5H5a1 1 0 0 1-1-1v-9.5Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg></span>Workspace</button>
                <button class="nav-item feature" data-view="novelty" type="button"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 3v18M3 12h18" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></span>Novelty Analyzer<span class="core-badge">Core Feature</span></button>
                <button class="nav-item" data-view="summary" type="button"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M7 4h10a1 1 0 0 1 1 1v14l-2-2-2 2-2-2-2 2-2-2-2 2V5a1 1 0 0 1 1-1Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg></span>Research Summary</button>
                <button class="nav-item" data-view="literature" type="button"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M7 5.5a1.5 1.5 0 0 1 1.5-1.5h6A1.5 1.5 0 0 1 16 5.5V19l-2-1.5L12 19l-2-1.5L8 19V5.5Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg></span>Literature Review</button>
                <button class="nav-item" data-view="gaps" type="button"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 4v16M4 12h16" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></span>Research Gaps</button>
                <button class="nav-item" data-view="citations" type="button"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 6h12M6 12h12M6 18h8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></span>Citation Gap Detection</button>
                <button class="nav-item" data-view="trends" type="button"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 19h16M7 15l3-3 2 2 5-6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Future Trends</button>
                <button class="nav-item" data-view="assistant" type="button"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M8 7.5A3.5 3.5 0 1 1 8 14.5h8a3.5 3.5 0 1 1 0-7" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></span>Research Assistant</button>
            </nav>
        </aside>
        <main class="main-panel">
            <header class="topbar">
                <div style="display:flex;align-items:center;gap:14px;">
                    <h1 style="background:linear-gradient(135deg,#0F62FE 0%,#08BDBA 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.02em;">ResearchNova AI</h1>
                    <div class="topbar-actions" style="margin-left:4px;">
                        <span class="pill" style="background:linear-gradient(135deg,rgba(15,98,254,0.12),rgba(8,189,186,0.12));border-color:rgba(15,98,254,0.25);color:#0F62FE;font-weight:700;">IBM Granite</span>
                        <span class="pill" style="background:linear-gradient(135deg,rgba(8,189,186,0.12),rgba(15,98,254,0.12));border-color:rgba(8,189,186,0.35);color:#07A39F;font-weight:700;">watsonx.ai</span>
                    </div>
                </div>
            </header>
            <section class="content-card">
                <div class="content-header" id="contentHeader">
                    <div class="content-title">
                        <h3 id="panelTitle">Workspace</h3>
                        <p id="panelSubtitle">Upload a research paper to begin your analysis.</p>
                    </div>
                    <div class="btn-row" id="panelActions"></div>
                </div>
                <div class="content-body">
                    <div id="workspacePanel"></div>
                </div>
            </section>
        </main>
    </div>
    <script>
        const endpointMap = {
            novelty: { url: "/novelty", key: "novelty", tab: "novelty" },
            literature: { url: "/review", key: "review", tab: "literature" },
            gaps: { url: "/gaps", key: "gaps", tab: "gaps" },
            citations: { url: "/citation-gaps", key: "citation_gaps", tab: "citations" },
            trends: { url: "/future-trends", key: "future_trends", tab: "trends" },
            summary: { url: "/summary", key: "summary", tab: "summary" }
        };
        const workspacePanel = document.getElementById("workspacePanel");
        const contentHeader = document.getElementById("contentHeader");
        const panelTitle = document.getElementById("panelTitle");
        const panelSubtitle = document.getElementById("panelSubtitle");
        const panelActions = document.getElementById("panelActions");
        const navButtons = Array.from(document.querySelectorAll(".nav-item"));
        let activeView = "workspace";
        let activeOutputState = { title: "", body: "", evidence: [], confidence: 0, timestamp: new Date().toISOString(), wordCount: 0, source: "" };
        let outputsByView = {}; // store outputs per view (summary, literature, gaps, etc.)
        let assistantHistory = [];
        let selectedPendingFile = null; // file selected via Browse but not yet uploaded
        let uploadedFileName = "";
        let uploadedFilePath = "";
        let uploadedPaperChunks = 0;
        let uploadedPages = 0;
        let uploadedKeywords = [];
        let uploadedAt = "";          // stores exact date+time string at upload moment
        let uploadedConfidence = 0;   // last known confidence score from any agent run
        let workflowSeed = [];
        let activityFeed = [];

        function nowStamp() { return new Date().toLocaleTimeString("en-US", { hour12: false }); }
        function asText(value) {
            if (value === undefined || value === null) return "";
            if (typeof value === "string") return value;
            if (typeof value === "object") return JSON.stringify(value, null, 2);
            return String(value);
        }
        function renderNoveltyView() {
            const title = "Novelty Analyzer";
            const subtitle = "Dedicated novelty analysis with an animated novelty score and concise insights.";
            panelTitle.textContent = title;
            panelSubtitle.textContent = subtitle;
            panelActions.innerHTML = `
                <button class="primary-btn" id="runNoveltyBtn" type="button">Generate Novelty</button>
            `;
            document.getElementById("runNoveltyBtn").addEventListener("click", () => runAgent("novelty"));

            const noveltyState = outputsByView['novelty'] || {};
            // Use the explicit novelty_score from the API response, not confidence*100
            const score = Math.max(0, Math.min(100, noveltyState.noveltyScore || 0));
            const contributions = (noveltyState.contributions || []).slice(0, 3);
            const suggestions = (noveltyState.suggestions || []).slice(0, 3);

            // determine grade color and label
            let gradeClass = 'grade-blue';
            let gradeLabel = 'MODERATE NOVELTY';
            if (score === 0) { gradeClass = 'grade-red'; gradeLabel = 'NOT ANALYZED'; }
            else if (score <= 20) { gradeClass = 'grade-red'; gradeLabel = 'LOW NOVELTY'; }
            else if (score <= 40) { gradeClass = 'grade-orange'; gradeLabel = 'FAIR NOVELTY'; }
            else if (score <= 60) { gradeClass = 'grade-blue'; gradeLabel = 'MODERATE NOVELTY'; }
            else if (score <= 80) { gradeClass = 'grade-green'; gradeLabel = 'GOOD NOVELTY'; }
            else { gradeClass = 'grade-gold'; gradeLabel = 'EXCELLENT NOVELTY'; }

            workspacePanel.innerHTML = `
                <div class="novelty-card fade-in">
                    <div class="novelty-hero grid-2">
                        <div style="display:grid;place-items:center;">
                            <div class="novelty-gauge" id="noveltyGaugeShell">
                                <div class="ring" id="noveltyRing"></div>
                                <div class="novelty-center">
                                    <div class="novelty-score ${gradeClass}" id="noveltyScore">0%</div>
                                    <div class="novelty-grade ${gradeClass}" id="noveltyGrade">${gradeLabel}</div>
                                </div>
                            </div>
                        </div>
                        <div style="padding-left:10px;">
                            <div style="margin-bottom:12px;">
                                <h4 style="margin-bottom:8px;">Key Contributions</h4>
                                <div id="keyContributions">
                                    ${contributions.length ? contributions.map(c => `<div class="metric-box" style="margin-bottom:8px;">• ${c}</div>`).join('') : '<div class="result-body" style="padding:12px;color:var(--text-soft);">No contributions identified yet. Generate novelty analysis to populate.</div>'}
                                </div>
                            </div>
                            <div style="margin-top:12px;">
                                <h4 style="margin-bottom:8px;">Suggested Improvements</h4>
                                <div id="suggestionsContainer">
                                    ${suggestions.length
                                        ? suggestions.map(s => `<div class="metric-box" style="margin-bottom:8px;">${s}</div>`).join('')
                                        : '<div class="result-body" style="padding:12px;color:var(--text-soft);">No suggestions provided. Generate novelty analysis to populate.</div>'}
                                </div>
                            </div>
                            <div style="margin-top:16px;display:flex;gap:8px;">
                                <button class="icon-btn" id="copyInlineBtn" type="button">Copy</button>
                                <button class="ghost-btn" data-export="md" type="button">Markdown</button>
                                <button class="ghost-btn" data-export="pdf" type="button">PDF</button>
                                <button class="ghost-btn" data-export="docx" type="button">DOCX</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // wire up export buttons
            document.querySelectorAll("[data-export]").forEach(btn => btn.addEventListener("click", () => window.location.href = `/export/${btn.dataset.export}`));

            // animate score increments from 0 to final over ~1.6s
            animateNoveltyScore(score, 1600);
        }

        function animateNoveltyScore(target, duration = 1600) {
            const display = document.getElementById('noveltyScore');
            const ring = document.getElementById('noveltyRing');
            const grade = document.getElementById('noveltyGrade');
            if (!display || !ring) return;
            const start = 0;
            const steps = Math.max(12, Math.round(duration / 80));
            let current = start;
            let stepCount = 0;
            const increment = (target - start) / steps;
            const step = () => {
                stepCount++;
                current = Math.min(target, Math.round((current + increment)));
                display.textContent = `${current}%`;
                // update ring background using conic-gradient with color stops
                const color = getNoveltyColor(current);
                ring.style.background = `conic-gradient(${color} ${current * 1}%, rgba(22,22,22,0.06) 0)`;
                if (stepCount < steps && current < target) requestAnimationFrame(step);
                else { display.textContent = `${target}%`; ring.style.background = `conic-gradient(${getNoveltyColor(target)} ${target * 1}%, rgba(22,22,22,0.06) 0)`; }
            };
            // create initial ring element style
            ring.style.borderRadius = '50%';
            ring.style.transition = `background ${duration}ms linear`;
            requestAnimationFrame(step);
        }

        function getNoveltyColor(score) {
            if (score <= 20) return 'rgba(214,69,69,0.95)';
            if (score <= 40) return 'rgba(230,126,34,0.95)';
            if (score <= 60) return 'rgba(42,116,255,0.95)';
            if (score <= 80) return 'rgba(47,158,68,0.95)';
            return 'rgba(255,176,0,0.95)';
        }

        function toggleContentHeader(show) {
            contentHeader.style.display = show ? 'grid' : 'none';
        }

        function setActiveView(view) {
            activeView = view;
            navButtons.forEach(button => button.classList.toggle('active', button.dataset.view === view));

            if (view === 'workspace') {
                toggleContentHeader(false);
                renderWorkspace();
                return;
            }

            toggleContentHeader(true);

if (view === 'novelty') {
    renderNoveltyView();
} else if (view === 'assistant') {
    renderAssistantView();
} else if (endpointMap[view]) {
    const titleMap = {
                    summary: 'Research Summary',
                    literature: 'Literature Review',
                    gaps: 'Research Gaps',
                    citations: 'Citation Gap Detection',
                    trends: 'Future Trends'
                };
                const subtitleMap = {
                    summary: 'Synthesize the most important findings.',
                    literature: 'Review key related works and citations.',
                    gaps: 'Identify critical gaps in the existing research.',
                    citations: 'Spot missing references and citation opportunities.',
                    trends: 'Surface future directions and emerging trends.'
                };
                const content = (outputsByView[view] && outputsByView[view].body) || '';
                renderOutputView(titleMap[view] || 'Research Output', subtitleMap[view] || '', content, view !== 'citations');
            } else {
                renderWorkspace();
            }
        }

        function showLoadingState(title, subtitle) {
            panelTitle.textContent = title;
            panelSubtitle.textContent = subtitle;
            panelActions.innerHTML = "";
            workspacePanel.innerHTML = `
                <div class="loading-shell">
                    <div class="skeleton-card"><div class="skeleton-line tall"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div>
                    <div class="skeleton-card"><div class="skeleton-line tall"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
                </div>
            `;
        }
        function renderWorkspace() {
            toggleContentHeader(false);
            panelTitle.textContent = "";
            panelSubtitle.textContent = "";
            panelActions.innerHTML = "";
            const hasPaper = Boolean(uploadedFileName);
            workspacePanel.innerHTML = `
                <div class="stack">
                    <div class="upload-card" id="uploadZone">
                        <div class="content-title" style="margin-bottom: 12px;"><h3>${hasPaper ? "Upload or Replace PDF" : "Upload Research Paper"}</h3><p>${hasPaper ? "Drop a new PDF here or browse to update the active paper." : "Drag & drop a PDF here or browse files to begin analysis."}</p></div>
                        <div class="upload-actions">
                            <label for="paperFile" class="primary-btn">Browse Files</label>
                            <button class="ghost-btn" id="uploadButton" type="button">Upload PDF</button>
                        </div>
                        <div id="selectedFileName" style="margin-top:10px;color:var(--text-soft);font-weight:600">${selectedPendingFile ? selectedPendingFile.name : ''}</div>
                        <input class="upload-input" id="paperFile" type="file" accept="application/pdf,.pdf">
                    </div>
                    ${buildActivePaperCard()}
                    <div class="assistant-card">
                        <div class="content-title" style="margin-bottom: 8px;"><h3>Research Assistant</h3><p>Ask follow-up questions grounded in the current paper and evidence.</p></div>
                        <div class="suggestion-row">
                            <button class="suggestion-chip" type="button" onclick="setActiveView('assistant')">Open Assistant</button>
                            <button class="suggestion-chip" type="button" onclick="setActiveView('novelty')">Review Novelty</button>
                        </div>
                    </div>
                </div>
            `;
            const previewPaperBtn = document.getElementById("previewPaperBtn");
            const replacePaperBtn = document.getElementById("replacePaperBtn");
            const removePaperBtn = document.getElementById("removePaperBtn");
            if (previewPaperBtn) previewPaperBtn.addEventListener("click", () => { if (uploadedFilePath) window.open(uploadedFilePath, "_blank"); });
            if (replacePaperBtn) replacePaperBtn.addEventListener("click", () => document.getElementById("paperFile")?.click());
            if (removePaperBtn) removePaperBtn.addEventListener("click", () => {
                uploadedFileName = "";
                uploadedFilePath = "";
                uploadedPaperChunks = 0;
                uploadedPages = 0;
                uploadedKeywords = [];
                uploadedAt = "";
                uploadedConfidence = 0;
                // clear generated outputs across all sections when paper is removed
                outputsByView = {};
                activeOutputState = { title: "", body: "", evidence: [], confidence: 0, timestamp: new Date().toISOString(), wordCount: 0, source: "" };
                renderWorkspace();
            });
            bindUploadEvents();
        }
        function buildActivePaperCard() {
            const hasPaper = Boolean(uploadedFileName);
            const displayAt = hasPaper ? (uploadedAt || "—") : "—";
            return `
                <div class="paper-card">
                    <div class="paper-card-header">
                        <div class="content-title">
                            <h3>Active Paper</h3>
                            <p>${hasPaper ? "Indexed content ready for analysis." : "Upload a PDF to begin analysis."}</p>
                        </div>
                        <div class="paper-card-actions">
                        </div>
                    </div>
                    <div class="meta-grid" style="margin-top: 14px;">
                        <div class="metric-box"><span class="metric-label">Paper Title</span><div class="metric-value">${hasPaper ? uploadedFileName : "No paper uploaded"}</div></div>
                        <div class="metric-box"><span class="metric-label">Authors</span><div class="metric-value">${hasPaper ? "Research Team" : "—"}</div></div>
                        <div class="metric-box"><span class="metric-label">Pages</span><div class="metric-value">${hasPaper ? (uploadedPages || "—") : "—"}</div></div>
                        <div class="metric-box"><span class="metric-label">Chunks Indexed</span><div class="metric-value" id="chunkCount">${hasPaper ? uploadedPaperChunks : "0"}</div></div>
                        <div class="metric-box"><span class="metric-label">Keywords</span><div class="metric-value">${hasPaper && uploadedKeywords.length ? uploadedKeywords.join(", ") : "—"}</div></div>
                        <div class="metric-box"><span class="metric-label">Uploaded Date & Time</span><div class="metric-value">${displayAt}</div></div>
                        <div class="metric-box"><span class="metric-label">Status</span><div class="metric-value">${hasPaper ? "✓ Indexed Successfully" : "Waiting for upload"}</div></div>
                    </div>
                    <div class="paper-card-actions" style="margin-top: 14px;">
                        <button class="primary-btn" id="previewPaperBtn" type="button" ${hasPaper ? "" : "disabled"}>Preview PDF</button>
                        <button class="ghost-btn" id="replacePaperBtn" type="button">Replace Paper</button>
                        <button class="ghost-btn" id="removePaperBtn" type="button" ${hasPaper ? "" : "disabled"}>Remove Paper</button>
                    </div>
                </div>
            `;
        }
        function renderOutputView(title, subtitle, content, showEvidence = true) {
            panelTitle.textContent = title;
            panelSubtitle.textContent = subtitle;
            const canGenerate = Boolean(endpointMap[activeView]);
            const generateLabels = {
                summary: 'Generate Summary',
                literature: 'Generate Literature Review',
                gaps: 'Identify Research Gaps',
                citations: 'Detect Citation Gaps',
                trends: 'Generate Future Trends'
            };
            const generateLabel = generateLabels[activeView] || 'Generate';
            panelActions.innerHTML = `
                ${canGenerate ? `<button class="primary-btn" id="runSectionBtn" type="button">${generateLabel}</button>` : ''}
                <button class="icon-btn" id="copyResultBtn" type="button">Copy</button>
                <button class="ghost-btn" data-export="md" type="button">Markdown</button>
                <button class="ghost-btn" data-export="pdf" type="button">PDF</button>
                <button class="ghost-btn" data-export="docx" type="button">DOCX</button>
            `;
            if (canGenerate) document.getElementById("runSectionBtn")?.addEventListener("click", () => runAgent(activeView));
            document.getElementById("copyResultBtn")?.addEventListener("click", (e) => copyCurrentResult(e.currentTarget));
            document.querySelectorAll("[data-export]").forEach(btn => btn.addEventListener("click", () => window.location.href = `/export/${btn.dataset.export}`));

            // Unified layout: render all sections the same way
            const full = content || '';
            const bodyHtml = full
                ? full.split(/\n+/).filter(Boolean).map(l => `<p style="margin:0 0 6px;">${l}</p>`).join('')
                : `<p style="color:var(--text-soft);font-style:italic;">No output generated yet. Click the generate button above to create one.</p>`;
            const html = `<div class="result-shell"><div class="result-body">${bodyHtml}</div></div>`;

            workspacePanel.innerHTML = html;
        }

        function formatGapCards(content) {
            try {
                const gaps = typeof content === 'string' ? JSON.parse(content) : content || [];
                if (!gaps.length) return '<div class="empty-card"><p>No gaps found.</p></div>';
                return gaps.map(g => `<div class="metric-box" style="border-left:4px solid var(--novelty);">${g.title ? `<strong>${g.title}</strong><div style="margin-top:6px;">${g.summary || g.description || ''}</div>` : `<div>${g}</div>`}</div>`).join('');
            } catch (e) { return `<div class="result-body">${content}</div>`; }
        }

        function formatCitationRecommendations(content) {
            try {
                const recs = typeof content === 'string' ? JSON.parse(content) : content || [];
                if (!recs.length) return '<li>No citation recommendations.</li>';
                return recs.map(r => `<li style="margin-bottom:8px;">${r}</li>`).join('');
            } catch (e) { return `<li>${content}</li>`; }
        }

        function formatTrendCards(content) {
            try {
                const trends = typeof content === 'string' ? JSON.parse(content) : content || [];
                if (!trends.length) return '<div class="empty-card"><p>No trends identified.</p></div>';
                return trends.map(t => `<div class="metric-box"><div style="display:flex;align-items:center;gap:8px;"><div style="width:36px;height:36px;border-radius:8px;background:var(--surface-soft);display:grid;place-items:center;">📈</div><div><strong>${t.title || t}</strong><div style="color:var(--text-soft);font-size:0.9rem">${t.summary || ''}</div></div></div></div>`).join('');
            } catch (e) { return `<div class="result-body">${content}</div>`; }
        }

        function formatAssistantMessages() {
            if (!assistantHistory.length) return '';
            return assistantHistory.map(m => `
                <div class="chat-msg chat-msg--${m.role}">
                    <div class="chat-bubble">${m.role === 'assistant' ? m.text.split(/\n+/).filter(Boolean).map(l => `<p>${l}</p>`).join('') : m.text}</div>
                </div>`).join('');
        }
        function appendAssistantMessage(role, text) {
            assistantHistory.push({ role, text });
            const container = document.getElementById('chatMessages');
            if (!container) return;
            const div = document.createElement('div');
            div.className = `chat-msg chat-msg--${role} fade-in`;
            div.innerHTML = `<div class="chat-bubble">${role === 'assistant' ? text.split(/\n+/).filter(Boolean).map(l => `<p>${l}</p>`).join('') : text}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        function renderAssistantView() {
            panelTitle.textContent = "Research Assistant";
            panelSubtitle.textContent = "Ask questions grounded in the uploaded paper.";
            panelActions.innerHTML = `<button class="ghost-btn" id="clearChatBtn" type="button">Clear Chat</button>`;
            const suggestions = [
                "What is the main contribution of this paper?",
                "What methodology was used?",
                "What are the key findings?",
                "What are the limitations?"
            ];
            workspacePanel.innerHTML = `
                <div style="display:flex;flex-direction:column;height:calc(100vh - 260px);min-height:420px;gap:0;">
                    <div id="chatMessages" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:var(--surface-soft);border:1px solid var(--border);border-radius:16px 16px 0 0;">
                        ${assistantHistory.length ? formatAssistantMessages() : `
                        <div style="margin:auto;text-align:center;color:var(--text-soft);padding:32px 16px;">
                            <div style="font-size:2rem;margin-bottom:12px;">💬</div>
                            <div style="font-weight:700;font-size:1rem;margin-bottom:6px;">Research Assistant</div>
                            <div style="font-size:0.9rem;line-height:1.6;">Ask any question about the uploaded paper.<br>Answers are grounded in the paper's content.</div>
                            <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:18px;">
                                ${suggestions.map(s => `<button class="suggestion-chip" type="button" onclick="fillAndSend(this.textContent)">${s}</button>`).join('')}
                            </div>
                        </div>`}
                    </div>
                    <div style="display:flex;gap:8px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 16px 16px;">
                        <input id="assistantInput" placeholder="Ask a question about the paper…" autocomplete="off"
                            style="flex:1;padding:11px 14px;border-radius:12px;border:1px solid var(--border);background:var(--surface-soft);color:var(--text);font-size:0.95rem;">
                        <button class="primary-btn" id="assistantSend" type="button" style="padding:10px 20px;">Send</button>
                    </div>
                </div>
            `;
            document.getElementById('assistantSend').addEventListener('click', sendAssistantMessage);
            document.getElementById('assistantInput').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAssistantMessage(); } });
            document.getElementById('clearChatBtn')?.addEventListener('click', () => { assistantHistory = []; renderAssistantView(); });
        }
        function fillAndSend(text) {
            const input = document.getElementById('assistantInput');
            if (input) { input.value = text; sendAssistantMessage(); }
        }
        async function sendAssistantMessage() {
            const inputEl = document.getElementById('assistantInput');
            if (!inputEl) return;
            const question = inputEl.value.trim();
            if (!question) return;
            inputEl.value = '';
            inputEl.disabled = true;
            // Remove empty-state placeholder if present
            const chatMessages = document.getElementById('chatMessages');
            const emptyState = chatMessages?.querySelector('div[style*="margin:auto"]');
            if (emptyState) emptyState.remove();
            appendAssistantMessage('user', question);
            // Typing indicator
            const typingEl = document.createElement('div');
            typingEl.className = 'chat-msg chat-msg--assistant';
            typingEl.id = 'typingIndicator';
            typingEl.innerHTML = `<div class="chat-bubble" style="font-style:italic;color:var(--text-soft);">Thinking…</div>`;
            chatMessages?.appendChild(typingEl);
            if (chatMessages) chatMessages.scrollTop = chatMessages.scrollHeight;
            try {
                const data = await fetchJson(`/api/ask?q=${encodeURIComponent(question)}`);
                typingEl.remove();
                const answerText = asText(data.answer || data.result || data.output || data.response || data.message || data);
                appendAssistantMessage('assistant', answerText || 'No answer returned.');
                activeOutputState.body = answerText;
                activeOutputState.evidence = data.evidence || [];
                activeOutputState.confidence = data.confidence_score || 0;
                if (data.confidence_score) uploadedConfidence = Math.max(uploadedConfidence, data.confidence_score);
                outputsByView['assistant'] = { ...activeOutputState };
            } catch (error) {
                typingEl.remove();
                appendAssistantMessage('assistant', error.message || 'Request failed.');
            } finally {
                inputEl.disabled = false;
                inputEl.focus();
            }
        }
        function renderExportView() {
            panelTitle.textContent = "Export";
            panelSubtitle.textContent = "Download polished analyses and reports in multiple formats.";
            panelActions.innerHTML = "";
            workspacePanel.innerHTML = `
                <div class="export-card">
                    <div class="content-title"><h3>Export Workspace</h3><p>Download the current report and supporting materials in your preferred format.</p></div>
                    <div class="export-grid" style="margin-top: 14px;">
                        <div class="export-item"><span>PDF</span><button class="ghost-btn" onclick="window.location.href='/export/pdf'">Download</button></div>
                        <div class="export-item"><span>DOCX</span><button class="ghost-btn" onclick="window.location.href='/export/docx'">Download</button></div>
                        <div class="export-item"><span>Markdown</span><button class="ghost-btn" onclick="window.location.href='/export/md'">Download</button></div>
                        <div class="export-item"><span>TXT</span><button class="ghost-btn" onclick="window.location.href='/export/txt'">Download</button></div>
                        <div class="export-item"><span>ZIP</span><button class="ghost-btn" onclick="window.location.href='/export/zip'">Download</button></div>
                        <div class="export-item"><span>Copy All Outputs</span><button class="primary-btn" onclick="copyCurrentResult(this)">Copy</button></div>
                    </div>
                </div>
            `;
        }
        async function renderInsightsView() {
            panelTitle.textContent = "Insights Dashboard";
            panelSubtitle.textContent = "Visual analysis of topic clusters, keyword frequency, sentiment, and concept graph.";
            panelActions.innerHTML = `<button class="primary-btn" id="refreshInsightsBtn" type="button">Refresh</button>`;
            document.getElementById('refreshInsightsBtn').addEventListener('click', renderInsightsView);
            workspacePanel.innerHTML = `<div class="loading-shell"><div class="skeleton-card"><div class="skeleton-line tall"></div><div class="skeleton-line medium"></div></div></div>`;
            let d;
            try { d = await fetchJson('/insights'); } catch(e) {
                workspacePanel.innerHTML = `<div class="result-body" style="color:var(--danger);">Failed to load insights: ${e.message}</div>`;
                return;
            }
            const { topic_clusters: rawClusters = [], top_keywords = [], sentiment = {}, graph = {} } = d;

            // If the Novelty Analyzer has been run, replace the "Novelty" cluster's pct
            // with the actual agent score so both sections stay in sync
            const agentNoveltyScore = (outputsByView['novelty'] && outputsByView['novelty'].noveltyScore) || null;
            const topic_clusters = rawClusters.map(t => {
                if (t.topic === 'Novelty' && agentNoveltyScore !== null) {
                    return { ...t, pct: agentNoveltyScore, count: agentNoveltyScore, _fromAgent: true };
                }
                return t;
            });

            const kwMax = Math.max(...(top_keywords.map(k => k.count)), 1);

            // ── Topic Cluster bars (horizontal SVG) ──
            const barH = 26, barGap = 10, barPad = 6, labelW = 130;
            const chartH = topic_clusters.length * (barH + barGap) + barPad * 2;
            const clusterBars = topic_clusters.map((t, i) => {
                const y = barPad + i * (barH + barGap);
                const w = Math.max(4, Math.round(t.pct * 3.2)); // max ~320px at 100%
                const colors = ['#3b82d4','#08BDBA','#FFB000','#2F9E44','#E67E22','#D64545','#7c5cd8'];
                const col = colors[i % colors.length];
                const label = t._fromAgent ? `${t.pct}% ★` : `${t.pct}%`;
                return `<g>
                  <text x="0" y="${y + barH - 7}" font-size="11" fill="#525252" font-family="sans-serif">${t.topic}</text>
                  <rect x="${labelW}" y="${y}" width="${w}" height="${barH}" rx="5" fill="${col}" opacity="0.85"/>
                  <text x="${labelW + w + 6}" y="${y + barH - 7}" font-size="11" fill="#525252" font-family="sans-serif">${label}</text>
                </g>`;
            }).join('');

            // ── Keyword frequency chart — extra bottom space for rotated labels ──
            const kw = top_keywords.slice(0, 12);
            const kwBarW = 34, kwBarGap = 8, kwBarsH = 120, kwLabelH = 55, kwPad = 16;
            const kwChartH = kwBarsH + kwLabelH;
            const kwChartW = kw.length * (kwBarW + kwBarGap) + kwPad * 2;
            const kwBars = kw.map((k, i) => {
                const bh = Math.max(4, Math.round(k.count / kwMax * (kwBarsH - 20)));
                const x = kwPad + i * (kwBarW + kwBarGap);
                const y = kwBarsH - bh;
                const lx = x + kwBarW / 2;
                const ly = kwBarsH + 6;
                return `<g>
                  <rect x="${x}" y="${y}" width="${kwBarW}" height="${bh}" rx="4" fill="#3b82d4" opacity="0.82"/>
                  <text x="${x + kwBarW/2}" y="${y - 3}" font-size="9" fill="#525252" text-anchor="middle" font-family="sans-serif">${k.count}</text>
                  <text transform="translate(${lx},${ly}) rotate(-40)" font-size="10" fill="#525252" text-anchor="end" font-family="sans-serif">${k.word}</text>
                </g>`;
            }).join('');

            // ── Sentiment donut (simple arc segments) ──
            function polarToXY(cx, cy, r, deg) {
                const rad = (deg - 90) * Math.PI / 180;
                return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
            }
            function arcPath(cx, cy, r, startDeg, endDeg, color) {
                if (endDeg - startDeg <= 0) return '';
                const [sx, sy] = polarToXY(cx, cy, r, startDeg);
                const [ex, ey] = polarToXY(cx, cy, r, endDeg);
                const large = (endDeg - startDeg > 180) ? 1 : 0;
                return `<path d="M${cx},${cy} L${sx},${sy} A${r},${r} 0 ${large},1 ${ex},${ey} Z" fill="${color}" opacity="0.85"/>`;
            }
            const sentPos = (sentiment.positive || 0) / 100 * 360;
            const sentNeg = (sentiment.negative || 0) / 100 * 360;
            const sentNeu = 360 - sentPos - sentNeg;
            const sentSVG = arcPath(60,60,52,0,sentPos,'#2F9E44')
                          + arcPath(60,60,52,sentPos,sentPos+sentNeg,'#D64545')
                          + arcPath(60,60,52,sentPos+sentNeg,360,'#DDE1E6')
                          + `<circle cx="60" cy="60" r="28" fill="white"/>
                             <text x="60" y="55" text-anchor="middle" font-size="11" fill="#525252" font-family="sans-serif">Sentiment</text>
                             <text x="60" y="70" text-anchor="middle" font-size="10" fill="#525252" font-family="sans-serif">${sentiment.positive||0}% pos</text>`;

            // ── Concept graph (nodes + edges) ──
            const nodes = graph.nodes || [];
            const edges = graph.edges || [];
            const gW = 440, gH = 260, cx0 = gW/2, cy0 = gH/2, rad0 = 100;
            const nodePos = {};
            nodes.forEach((n, i) => {
                const angle = (2 * Math.PI * i) / nodes.length - Math.PI / 2;
                nodePos[n.id] = [cx0 + rad0 * Math.cos(angle), cy0 + rad0 * Math.sin(angle)];
            });
            const edgeSVG = edges.map(e => {
                const [x1,y1] = nodePos[e.source] || [cx0, cy0];
                const [x2,y2] = nodePos[e.target] || [cx0, cy0];
                const sw = Math.min(4, 1 + e.weight * 0.3);
                return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#B7C4D4" stroke-width="${sw}"/>`;
            }).join('');
            const nodeSVG = nodes.map(n => {
                const [x, y] = nodePos[n.id] || [cx0, cy0];
                // Truncate label to 8 chars so it always fits in the circle
                const lbl = n.label.length > 8 ? n.label.slice(0, 7) + '…' : n.label;
                return `<g>
                  <circle cx="${x}" cy="${y}" r="26" fill="#3b82d4" opacity="0.88"/>
                  <text x="${x}" y="${y + 4}" text-anchor="middle" font-size="9" font-weight="600" fill="white" font-family="sans-serif">${lbl}</text>
                </g>`;
            }).join('');

            const noData = `<p style="color:var(--text-soft);font-style:italic;padding:12px;">Upload a paper first to generate insights.</p>`;

            workspacePanel.innerHTML = `
              <div class="stack fade-in">
                <div class="grid-2">
                  <div class="content-card" style="border-radius:var(--radius-lg);overflow:hidden;">
                    <div class="content-header"><div class="content-title"><h3>Topic Clusters</h3><p>Distribution of research themes</p></div></div>
                    <div class="content-body">
                      ${topic_clusters.length
                        ? `<svg width="100%" viewBox="0 0 500 ${chartH}" xmlns="http://www.w3.org/2000/svg" overflow="visible">${clusterBars}</svg>`
                        : noData}
                    </div>
                  </div>
                  <div class="content-card" style="border-radius:var(--radius-lg);overflow:hidden;">
                    <div class="content-header"><div class="content-title"><h3>Keyword Frequency</h3><p>Top 12 content keywords</p></div></div>
                    <div class="content-body" style="overflow:visible;">
                      ${kw.length
                        ? `<svg width="100%" viewBox="0 0 ${kwChartW} ${kwChartH}" xmlns="http://www.w3.org/2000/svg" overflow="visible">${kwBars}</svg>`
                        : noData}
                    </div>
                  </div>
                </div>
                <div class="grid-2">
                  <div class="content-card" style="border-radius:var(--radius-lg);overflow:hidden;">
                    <div class="content-header"><div class="content-title"><h3>Sentiment Analysis</h3><p>Positive / negative / neutral tone</p></div></div>
                    <div class="content-body" style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
                      <svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">${sentSVG}</svg>
                      <div style="display:grid;gap:6px;">
                        <div style="display:flex;align-items:center;gap:8px;"><span style="width:12px;height:12px;border-radius:2px;background:#2F9E44;display:inline-block;"></span><span style="font-size:0.88rem;">Positive ${sentiment.positive||0}%</span></div>
                        <div style="display:flex;align-items:center;gap:8px;"><span style="width:12px;height:12px;border-radius:2px;background:#D64545;display:inline-block;"></span><span style="font-size:0.88rem;">Negative ${sentiment.negative||0}%</span></div>
                        <div style="display:flex;align-items:center;gap:8px;"><span style="width:12px;height:12px;border-radius:2px;background:#DDE1E6;display:inline-block;"></span><span style="font-size:0.88rem;">Neutral ${sentiment.neutral||0}%</span></div>
                      </div>
                    </div>
                  </div>
                  <div class="content-card" style="border-radius:var(--radius-lg);overflow:hidden;">
                    <div class="content-header"><div class="content-title"><h3>Concept Graph</h3><p>Co-occurrence of top keywords</p></div></div>
                    <div class="content-body">
                      ${nodes.length
                        ? `<svg width="100%" viewBox="0 0 ${gW} ${gH}" xmlns="http://www.w3.org/2000/svg">${edgeSVG}${nodeSVG}</svg>`
                        : noData}
                    </div>
                  </div>
                </div>
              </div>
            `;
        }

        function copyCurrentResult(btn) {
            const text = activeOutputState.body || "";
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    try {
                        if (btn && btn.tagName) {
                            const orig = btn.textContent;
                            btn.textContent = 'Copied';
                            setTimeout(() => btn.textContent = orig, 1200);
                        }
                    } catch (e) {}
                }).catch(() => {});
            }
        }
        function addActivity(label, status = "complete", detail = "") {
            const entry = { label, status, detail: detail || nowStamp() };
            activityFeed = [entry, ...activityFeed].slice(0, 8);
            if (activeView === "workspace") {
                renderWorkspace();
            }
            // Do not rerender the current active view for non-workspace pages,
            // because the assistant chat and other interactive views should preserve state.
        }
        function setPaperMeta(data) {
            const paper = data.active_paper || {};
            uploadedPaperChunks = paper.chunks || data.chunks || 0;
            uploadedPages = paper.pages || data.pages || 0;
            const kws = paper.keywords || data.keywords;
            if (Array.isArray(kws) && kws.length) uploadedKeywords = kws;
            if (paper.filename) {
                uploadedFileName = paper.filename;
            }
            const chunkCount = document.getElementById("chunkCount");
            if (chunkCount) chunkCount.textContent = uploadedPaperChunks;
        }
        function parseNoveltySection(text, headings) {
            // headings is an array of possible section header strings (lowercase)
            const lines = text.split('\n');
            const results = [];
            let capturing = false;
            for (const line of lines) {
                const lower = line.toLowerCase().trim();
                if (headings.some(h => lower.startsWith(h))) { capturing = true; continue; }
                // stop at next section header (a line ending with ":" that is short)
                if (capturing && lower.match(/^[a-z\s\/]{3,40}:$/) && !headings.some(h => lower.startsWith(h))) { capturing = false; }
                if (capturing) {
                    const clean = line.replace(/^[-*•]\s*/, '').trim();
                    if (clean) results.push(clean);
                }
            }
            return results;
        }
        function applyAgentData(name, data) {
            const config = endpointMap[name];
            if (!config) return;

            if (name === "novelty") {
                // data.novelty is {novelty_score: N, analysis: "..."}
                const noveltyPayload = data.novelty || {};
                const analysisText = typeof noveltyPayload === 'object'
                    ? (noveltyPayload.analysis || "")
                    : asText(noveltyPayload);
                const noveltyScore = typeof noveltyPayload === 'object'
                    ? (noveltyPayload.novelty_score || 0)
                    : 0;
                const contributions =
    noveltyPayload.contributions ||
    parseNoveltySection(
        analysisText,
        ['novel contributions:', 'key contributions:', 'contributions:']
    );

const suggestions =
    noveltyPayload.suggestions ||
    parseNoveltySection(
        analysisText,
        ['suggested improvements:', 'suggestions:', 'improvements:']
    );
                activeOutputState = {
                    title: "novelty",
                    body: analysisText,
                    evidence: data.evidence || [],
                    confidence: data.confidence_score || 0,
                    timestamp: new Date().toISOString(),
                    wordCount: Math.max(80, Math.ceil(analysisText.split(/\s+/).filter(Boolean).length)),
                    source: data.source || ""
                };
                if (data.confidence_score) uploadedConfidence = Math.max(uploadedConfidence, data.confidence_score);
                outputsByView['novelty'] = {
                    ...activeOutputState,
                    noveltyScore,
                    contributions,
                    suggestions
                };
                renderNoveltyView();
                addActivity("Novelty Agent", "complete", "novelty completed");
                return;
            }

            const output = data[config.key]
                || data[config.tab]
                || (data.outputs && data.outputs[config.key])
                || (data.outputs && data.outputs[config.tab])
                || data.output
                || data.body
                || data;
            const outputText = asText(output);
            activeOutputState = {
                title: config.tab,
                body: outputText,
                evidence: data.evidence || [],
                confidence: data.confidence_score || 0,
                timestamp: new Date().toISOString(),
                wordCount: Math.max(80, Math.ceil(outputText.split(/\s+/).filter(Boolean).length)),
                source: data.source || ""
            };
            if (data.confidence_score) uploadedConfidence = Math.max(uploadedConfidence, data.confidence_score);
            // persist output for this agent/view so switching views keeps per-section outputs
            outputsByView[config.tab] = activeOutputState;
            if (activeView === "workspace") renderWorkspace();
            else if (activeView === "novelty") renderNoveltyView();
            else setActiveView(activeView);
            addActivity(name === "summary" ? "Research Summary" : "Agent Workflow", "complete", `${name} completed`);
        }
        async function fetchJson(url, options) {
            const response = await fetch(url, options);
            const data = await response.json();
            if (!response.ok) throw new Error(data.detail || data.error || "Request failed");
            return data;
        }
        async function runAgent(name) {
            const config = endpointMap[name];
            if (!config) return;
            showLoadingState("Analyzing research", `Fetching ${name} findings from the grounded workflow.`);
            addActivity("Agent Selected", "running", `${name} workflow`);
            try {
                const data = await fetchJson(config.url);
                applyAgentData(name, data);
                addActivity("Agent Completed", "complete", `${name} generated`);
            } catch (error) {
                addActivity("Agent Error", "error", error.message);
            }
        }
        async function runDashboard() {
            showLoadingState("Running workflow", "Orchestrating retrieval, novelty, and synthesis agents.");
            addActivity("Full Workflow", "running", "Orchestrating agents");
            try {
                const data = await fetchJson("/dashboard");
                setPaperMeta(data);
                const outputs = data.outputs || {};
                activeOutputState = { title: "dashboard", body: asText(outputs.summary || outputs.literature_review || outputs.novelty || ""), evidence: data.evidence || [], confidence: data.confidence_score || 0, timestamp: new Date().toISOString(), wordCount: 120, source: "" };
                // persist dashboard output for current view if applicable
                outputsByView[activeView] = activeOutputState;
                if (activeView === "workspace") renderWorkspace();
                else if (activeView === "novelty") renderNoveltyView();
                else setActiveView(activeView);
                addActivity("Workflow Completed", "complete", "Dashboard analysis complete");
            } catch (error) {
                addActivity("Workflow Error", "error", error.message);
            }
        }
        async function handlePaperUpload(file) {
            if (!file) return;
            showLoadingState("Uploading paper", `Preparing ${file.name} for indexing and retrieval.`);
            addActivity("PDF Upload", "running", file.name);
            const formData = new FormData();
            formData.append("file", file);
            try {
                const data = await fetchJson("/upload", { method: "POST", body: formData });
                uploadedFileName = data.active_paper?.filename || file.name;
                uploadedFilePath = `/uploads/${encodeURIComponent(uploadedFileName)}`;
                uploadedAt = new Date().toLocaleString();
                setPaperMeta(data);
                workflowSeed = data.activity || [];
                renderWorkspace();
                addActivity("Indexing Complete", "complete", `${uploadedFileName} ready`);
            } catch (error) {
                addActivity("Upload Error", "error", error.message);
            }
        }
        function bindUploadEvents() {
            const uploadZone = document.getElementById("uploadZone");
            const paperFileInput = document.getElementById("paperFile");
            const uploadButton = document.getElementById("uploadButton");
            const previewPaperBtn = document.getElementById("previewPaperBtn");
            const replacePaperBtn = document.getElementById("replacePaperBtn");
            const removePaperBtn = document.getElementById("removePaperBtn");
            // Browse (label) opens file selector; Upload button will either open selector or upload selected file
            if (uploadButton) uploadButton.addEventListener("click", async () => {
                const file = paperFileInput?.files?.[0] || selectedPendingFile;
                if (file) {
                    // show uploading state
                    const orig = uploadButton.textContent;
                    uploadButton.disabled = true;
                    uploadButton.textContent = 'Uploading...';
                    await handlePaperUpload(file);
                    uploadButton.textContent = 'Uploaded';
                    setTimeout(() => { uploadButton.textContent = 'Upload PDF'; uploadButton.disabled = false; renderWorkspace(); }, 900);
                } else {
                    paperFileInput?.click();
                }
            });
            if (previewPaperBtn) previewPaperBtn.addEventListener("click", () => { if (uploadedFilePath) window.open(uploadedFilePath, "_blank"); });
            if (replacePaperBtn) replacePaperBtn.addEventListener("click", () => paperFileInput?.click());
            if (removePaperBtn) removePaperBtn.addEventListener("click", () => {
                uploadedFileName = "";
                uploadedFilePath = "";
                uploadedPaperChunks = 0;
                outputsByView = {};
                activeOutputState = { title: "", body: "", evidence: [], confidence: 0, timestamp: new Date().toISOString(), wordCount: 0, source: "" };
                renderWorkspace();
            });
            // When a file is chosen via Browse, show it as selected but don't auto-upload
            paperFileInput?.addEventListener("change", event => {
                const file = event.target.files?.[0];
                selectedPendingFile = file || null;
                const selectedNameEl = document.getElementById('selectedFileName');
                if (selectedNameEl) selectedNameEl.textContent = file ? `Selected: ${file.name}` : '';
            });
            ["dragenter", "dragover"].forEach(eventName => uploadZone?.addEventListener(eventName, event => { event.preventDefault(); uploadZone.classList.add("drag-over"); }));
            ["dragleave", "drop"].forEach(eventName => uploadZone?.addEventListener(eventName, event => { event.preventDefault(); uploadZone.classList.remove("drag-over"); }));
            uploadZone?.addEventListener("drop", event => {
                const file = event.dataTransfer?.files?.[0];
                if (file) {
                    const dt = new DataTransfer();
                    dt.items.add(file);
                    paperFileInput.files = dt.files;
                    paperFileInput.dispatchEvent(new Event("change"));
                }
            });
        }
        document.addEventListener("click", event => {
            const nav = event.target.closest("[data-view]");
            if (nav) {
                setActiveView(nav.dataset.view);
            }
        });
        document.addEventListener("DOMContentLoaded", () => {
            renderWorkspace();
            addActivity("Workspace Initialized", "complete", "Ready for research analysis");
        });
    </script>
</body>
</html>
